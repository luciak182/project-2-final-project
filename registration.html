<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="reg.css" />
    <title>Registrační formulář Netflix</title>
  </head>
  <body>
    <header>
      <img src="./img/netflix-logo.png" alt="Netflix logo" />
      <a href="./index.html" class="btn">Zpět na hlavní</a>
    </header>
    <form class="reg-form">
      <input type="text" placeholder="Křestní jméno" />
      <input type="text" placeholder="Příjmení" />
      <input type="email" placeholder="Přihlašovací e-mail" />
      <input type="password" placeholder="Vaše heslo" id="password" />
      <input type="password" placeholder="Heslo znovu" id="password-repeat" />
      <button type="submit">Odeslat</button>
    </form>
    <script src="reg.js"></script>
  </body>
</html>
